<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>倒计时器（置顶）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">
    <div class="content-wrapper">
      <button id="display" class="time no-drag" title="点击设置时间">05:00</button>

      <div id="progress-track-wrapper" class="progress-track no-drag" aria-hidden="true">
        <div id="progress-bar" class="progress-bar"></div>
      </div>

      <!-- 内联时间设置面板 -->
      <div id="time-panel" class="inline-panel hidden no-drag">
        <div class="panel-title">设置时间</div>
        <div class="time-edit-row">
          <div class="time-edit-group">
            <span class="time-edit-label">分钟</span>
            <input id="input-min" class="time-edit-input" type="number" min="0" value="5">
          </div>
          <span class="time-edit-colon">:</span>
          <div class="time-edit-group">
            <span class="time-edit-label">秒</span>
            <input id="input-sec" class="time-edit-input" type="number" min="0" max="59" value="0">
          </div>
        </div>
        <div class="panel-btns">
          <button id="apply-time-btn" class="btn-primary">确认</button>
          <button id="cancel-time-btn" class="btn-secondary">取消</button>
        </div>

        <div class="setting-section" style="margin-top: 14px; margin-bottom: 0;">
          <div class="setting-section-label">
            快捷时间 <span class="section-hint">最多 6 个</span>
          </div>
          <div id="preset-list" class="preset-list"></div>
          <div id="add-preset-form" class="add-preset-form hidden">
            <input id="preset-input-min" class="preset-mini-input" type="number" min="0" placeholder="分">
            <span class="colon-text">:</span>
            <input id="preset-input-sec" class="preset-mini-input" type="number" min="0" max="59" placeholder="秒">
            <button id="save-preset-btn" class="btn-mini-primary">保存</button>
            <button id="cancel-preset-btn" class="btn-mini-secondary">✕</button>
          </div>
        </div>
      </div>

      <!-- 内联样式设置面板 -->
      <div id="settings-panel" class="inline-panel hidden no-drag">
        <div class="panel-title">设置</div>

        <div class="setting-section">
          <div class="setting-section-label">背景透明度: <span id="bg-opacity-value">95%</span></div>
          <input id="bg-opacity" class="opacity-slider" type="range" min="0" max="100" value="95">
        </div>

        <div class="setting-section">
          <div class="setting-section-label">倒计时颜色</div>
          <div class="color-section-label">默认颜色</div>
          <div id="default-colors" class="color-options color-options-default">
            <button type="button" class="color-option" data-color="#ffffff" style="background:#ffffff" title="白色"></button>
            <button type="button" class="color-option" data-color="#3b82f6" style="background:#3b82f6" title="蓝色"></button>
            <button type="button" class="color-option" data-color="#22c55e" style="background:#22c55e" title="绿色"></button>
            <button type="button" class="color-option" data-color="#eab308" style="background:#eab308" title="黄色"></button>
            <button type="button" class="color-option" data-color="#f97316" style="background:#f97316" title="橙色"></button>
            <button type="button" class="color-option" data-color="#ec4899" style="background:#ec4899" title="粉色"></button>
            <button type="button" class="color-option" data-color="#a855f7" style="background:#a855f7" title="紫色"></button>
            <button type="button" class="color-option" data-color="#06b6d4" style="background:#06b6d4" title="青色"></button>
          </div>
          <div id="custom-colors-section" class="custom-colors-section hidden">
            <div class="color-section-label">自定义颜色</div>
            <div id="custom-colors-list" class="custom-colors-list"></div>
          </div>
          <div class="color-section-label">颜色选择器 <span class="section-hint">最多 4 个</span></div>
          <div class="custom-color-row">
            <input id="custom-color-picker" type="color" value="#ffffff" title="颜色选择器">
            <input id="custom-color-hex" type="text" value="#ffffff" maxlength="7" placeholder="#ffffff">
            <button type="button" id="add-custom-color-btn" class="btn-add-color">添加</button>
          </div>
        </div>

        <div class="setting-section setting-toggles">
          <label class="setting-toggle"><input id="show-progress-toggle" type="checkbox" checked> 显示进度条</label>
          <label class="setting-toggle"><input id="always-on-top-toggle" type="checkbox" checked> 始终置顶</label>
        </div>

        <button id="quit-app-btn" class="btn-full" style="background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); margin-bottom: 8px;">退出应用</button>
        <button id="settings-close-btn" class="btn-full" style="margin-top: 0;">关闭</button>
      </div>

      <!-- 主控按钮 -->
      <div class="primary-controls no-drag">
        <button id="toggle-btn" class="icon-btn btn-play" title="开始">▶</button>
        <button id="reset-btn-main" class="icon-btn" title="重置">⟲</button>
        <button id="settings-btn" class="icon-btn" title="设置">⚙</button>
        <button id="quit-btn" class="icon-btn icon-btn-quit" title="退出">✕</button>
      </div>
    </div>
  </div>

  <audio id="alarm">
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAAAB3AQACABAAZGF0YQAAAAA=" type="audio/wav">
  </audio>

  <script src="renderer.js"></script>
</body>

</html>
